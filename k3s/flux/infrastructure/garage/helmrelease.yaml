apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
  namespace: garage
spec:
  interval: 30m
  chart:
    spec:
      chart: garage
      sourceRef:
        kind: HelmRepository
        name: garage
        namespace: flux-system
  values:
    image:
      repository: dxflrs/garage
      tag: v2.2.0

    garage:
      # Single-node for local dev
      replicationFactor: "1"
      consistencyMode: "consistent"
      dbEngine: "lmdb"
      compressionLevel: "1"

      s3:
        api:
          region: "garage"
          rootDomain: ".s3.garage.local"
        web:
          rootDomain: ".web.garage.local"
          index: "index.html"

    persistence:
      enabled: true
      meta:
        size: 500Mi
      data:
        size: 20Gi

    # Single replica
    replicaCount: 1

    # Init job to create bucket and API key for Loki
    initContainers: []

    monitoring:
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          labels:
            release: kube-prometheus-stack
