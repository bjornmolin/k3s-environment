apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo
  labels:
    app: forgejo-runner
spec:
  replicas: 0
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6.3.1
          command:
            - sh
            - -c
            - |
              TOKEN=$(cat /etc/runner/token)
              # Register runner if not already registered
              if [ ! -f /data/.runner ]; then
                forgejo-runner register \
                  --instance http://forgejo-http.forgejo.svc.cluster.local:3000 \
                  --token "$TOKEN" \
                  --name k3s-runner \
                  --labels ubuntu-latest:docker://node:20-bookworm,buildah:docker://quay.io/buildah/stable \
                  --no-interactive
              fi
              forgejo-runner daemon
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-token
              mountPath: /etc/runner
              readOnly: true
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
      volumes:
        - name: runner-data
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
        - name: runner-token
          secret:
            secretName: forgejo-runner-token
