apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 30m
  chart:
    spec:
      chart: forgejo
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  values:
    gitea:
      admin:
        existingSecret: forgejo-admin
        username: forgejo_admin
        email: admin@dev.local

      config:
        server:
          DOMAIN: forgejo.dev.local
          ROOT_URL: https://forgejo.dev.local
          HTTP_PORT: "3000"
          PROTOCOL: http

        actions:
          ENABLED: "true"

        repository:
          DEFAULT_PRIVATE: last

        database:
          DB_TYPE: sqlite3

        cache:
          ADAPTER: memory

        session:
          PROVIDER: memory

        queue:
          TYPE: level

    service:
      http:
        type: ClusterIP
        port: 3000

    persistence:
      enabled: true
      size: 10Gi

    # Disable external dependencies — use SQLite/memory for local dev
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    redis-cluster:
      enabled: false
