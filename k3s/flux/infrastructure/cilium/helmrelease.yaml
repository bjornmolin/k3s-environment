apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    # k3s specific
    operator:
      replicas: 1
    ipam:
      mode: kubernetes

    # Replace kube-proxy for full LB support
    kubeProxyReplacement: "true"
    k8sServiceHost: "localhost"
    k8sServicePort: "6443"

    # Enable Gateway API (replaces Traefik ingress)
    gatewayAPI:
      enabled: true
      hostNetwork:
        enabled: true

    # Load balancer for Gateway
    l2announcements:
      enabled: true
    externalIPs:
      enabled: true

    # Enable Hubble observability
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
      metrics:
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - icmp
          - http
        serviceMonitor:
          enabled: true
          labels:
            release: kube-prometheus-stack
