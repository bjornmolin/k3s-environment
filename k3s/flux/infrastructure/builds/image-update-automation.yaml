apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: gitops-update
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: wallet-local-gitops
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: flux-image-automation
        email: flux@dev.local
      messageTemplate: |
        chore: update image {{range .Changed.Objects}}{{.Name}} to {{.NewValue}} {{end}}
    push:
      branch: main
  update:
    path: ./apps
    strategy: Setters
