apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: dev-local
      namespace: default
      sectionName: https
  hostnames:
    - grafana.dev.local
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
