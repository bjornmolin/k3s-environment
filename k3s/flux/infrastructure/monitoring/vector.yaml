apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: vector
      sourceRef:
        kind: HelmRepository
        name: vector
        namespace: flux-system
  values:
    role: Agent

    service:
      enabled: false

    tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists

    customConfig:
      data_dir: /vector-data-dir

      sources:
        kubernetes_logs:
          type: kubernetes_logs

      transforms:
        kube_logs_parsed:
          type: remap
          inputs:
            - kubernetes_logs
          source: |
            .namespace = .kubernetes.pod_namespace
            .pod = .kubernetes.pod_name
            .container = .kubernetes.container_name
            .node_name = .kubernetes.pod_node_name

      sinks:
        loki:
          type: loki
          inputs:
            - kube_logs_parsed
          endpoint: http://loki.monitoring.svc.cluster.local:3100
          labels:
            namespace: "{{ `{{ namespace }}` }}"
            pod: "{{ `{{ pod }}` }}"
            container: "{{ `{{ container }}` }}"
            node_name: "{{ `{{ node_name }}` }}"
            source: "{{ `{{ source_type }}` }}"
          encoding:
            codec: text
