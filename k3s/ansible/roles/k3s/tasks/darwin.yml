---
- name: Check if Lima VM exists
  ansible.builtin.shell: limactl list --format '{% raw %}{{.Name}}:{{.Status}}{% endraw %}' 2>/dev/null || true
  register: lima_list
  changed_when: false

- name: Set lima VM status
  ansible.builtin.set_fact:
    lima_vm_exists: "{{ lima_vm_name in (lima_list.stdout_lines | map('regex_replace', ':.*', '') | list) }}"
    lima_vm_running: "{{ (lima_vm_name + ':Running') in lima_list.stdout_lines }}"

- name: Create and start Lima VM
  ansible.builtin.command: >
    limactl start --name={{ lima_vm_name }} --tty=false {{ lima_config }}
  when: not lima_vm_exists
  changed_when: true

- name: Start existing Lima VM
  ansible.builtin.command: limactl start {{ lima_vm_name }}
  when: lima_vm_exists and not lima_vm_running
  changed_when: true

- name: Wait for k3s inside Lima to be ready
  ansible.builtin.command: >
    limactl shell {{ lima_vm_name }} sudo k3s kubectl get nodes
  register: lima_k3s_check
  changed_when: false
  retries: 12
  delay: 10
  until: lima_k3s_check.rc == 0

- name: Extract kubeconfig from Lima VM
  ansible.builtin.shell: >
    limactl shell {{ lima_vm_name }} sudo cat /etc/rancher/k3s/k3s.yaml |
    sed 's/127.0.0.1/localhost/g'
  register: lima_kubeconfig
  changed_when: false

- name: Write kubeconfig
  ansible.builtin.copy:
    content: "{{ lima_kubeconfig.stdout }}"
    dest: "{{ kubeconfig_path }}"
    mode: "0600"
