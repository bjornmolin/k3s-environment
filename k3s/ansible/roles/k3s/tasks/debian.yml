---
- name: Check if k3s is installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s
  when: not k3s_binary.stat.exists
  block:
    - name: Download and run k3s install script
      ansible.builtin.shell: >
        curl -sfL https://get.k3s.io | sh -s - --disable=traefik --disable=servicelb --flannel-backend=none --disable-network-policy --disable-kube-proxy --write-kubeconfig-mode 644 --resolv-conf /run/systemd/resolve/resolv.conf
      become: true
      changed_when: true

- name: Enable and start k3s service
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
  become: true

- name: Wait for k3s manifests directory
  ansible.builtin.command: test -d /var/lib/rancher/k3s/server/manifests
  become: true
  changed_when: false
  retries: 12
  delay: 5
  register: manifests_dir
  until: manifests_dir.rc == 0

- name: Get upstream DNS server
  ansible.builtin.shell: |
    if [ -f /run/systemd/resolve/resolv.conf ]; then
      grep '^nameserver' /run/systemd/resolve/resolv.conf | head -1 | awk '{print $2}'
    else
      echo "8.8.8.8"
    fi
  register: upstream_dns
  changed_when: false

- name: Configure CoreDNS to use upstream DNS directly
  ansible.builtin.copy:
    content: |
      apiVersion: helm.cattle.io/v1
      kind: HelmChartConfig
      metadata:
        name: coredns
        namespace: kube-system
      spec:
        valuesContent: |-
          servers:
            - zones:
                - zone: .
              port: 53
              plugins:
                - name: errors
                - name: health
                  configBlock: lameduck 5s
                - name: ready
                - name: kubernetes
                  parameters: cluster.local in-addr.arpa ip6.arpa
                  configBlock: |-
                    pods insecure
                    fallthrough in-addr.arpa ip6.arpa
                - name: hosts
                  parameters: /etc/coredns/NodeHosts
                  configBlock: |-
                    ttl 60
                    reload 15s
                    fallthrough
                - name: prometheus
                  parameters: :9153
                - name: forward
                  parameters: . {{ upstream_dns.stdout }}
                - name: cache
                  parameters: 30
                - name: loop
                - name: reload
                - name: loadbalance
    dest: /var/lib/rancher/k3s/server/manifests/coredns-custom.yaml
    mode: "0644"
  become: true

- name: Copy kubeconfig
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ kubeconfig_path }}"
    remote_src: true
    owner: "{{ ansible_env.USER }}"
    mode: "0600"
  become: true

- name: Create kubectl symlink if needed
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
    force: true
  become: true
  failed_when: false

- name: Check if nerdctl is installed
  ansible.builtin.command: nerdctl --version
  register: nerdctl_check
  changed_when: false
  failed_when: false

- name: Install nerdctl
  when: nerdctl_check.rc != 0
  block:
    - name: Download nerdctl
      ansible.builtin.get_url:
        url: "https://github.com/containerd/nerdctl/releases/download/v{{ nerdctl_version }}/nerdctl-full-{{ nerdctl_version }}-linux-amd64.tar.gz"
        dest: /tmp/nerdctl.tar.gz
        mode: "0644"

    - name: Extract nerdctl
      ansible.builtin.unarchive:
        src: /tmp/nerdctl.tar.gz
        dest: /usr/local
        remote_src: true
      become: true

- name: Check if buildkitd is installed
  ansible.builtin.command: buildkitd --version
  register: buildkitd_check
  changed_when: false
  failed_when: false

- name: Install buildkit
  when: buildkitd_check.rc != 0
  block:
    - name: Download buildkit
      ansible.builtin.get_url:
        url: "https://github.com/moby/buildkit/releases/download/v{{ buildkit_version }}/buildkit-v{{ buildkit_version }}.linux-amd64.tar.gz"
        dest: /tmp/buildkit.tar.gz
        mode: "0644"

    - name: Extract buildkit
      ansible.builtin.unarchive:
        src: /tmp/buildkit.tar.gz
        dest: /usr/local
        remote_src: true
      become: true

- name: Start buildkitd if not running
  ansible.builtin.shell: |
    if ! pgrep -x buildkitd > /dev/null 2>&1; then
      nohup buildkitd \
        --containerd-worker-addr /run/k3s/containerd/containerd.sock \
        --addr unix:///run/buildkit/buildkitd.sock \
        >/var/log/buildkitd.log 2>&1 &
      sleep 2
    fi
  become: true
  changed_when: false
