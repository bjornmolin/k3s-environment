---
- name: Load gitops config
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../gitops-config.yaml"

# --- Cilium CNI must be installed before anything else can schedule ---

- name: Install Gateway API CRDs
  ansible.builtin.command: >
    kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml
  register: gwapi_apply
  changed_when: "'configured' in gwapi_apply.stdout or 'created' in gwapi_apply.stdout"

- name: Flush stale Cilium iptables rules (Linux)
  ansible.builtin.shell: |
    sudo iptables -t nat -F OLD_CILIUM_POST_nat 2>/dev/null || true
    sudo iptables -t nat -X OLD_CILIUM_POST_nat 2>/dev/null || true
  changed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: Check if Cilium is installed
  ansible.builtin.command: helm status cilium -n kube-system
  register: cilium_check
  changed_when: false
  failed_when: false

- name: Install Cilium via Helm (CNI bootstrap - before Flux)
  when: cilium_check.rc != 0
  block:
    - name: Add Cilium Helm repo
      ansible.builtin.command: helm repo add cilium https://helm.cilium.io/
      changed_when: false

    - name: Install Cilium
      ansible.builtin.command: >
        helm install cilium cilium/cilium
        --namespace kube-system
        --set operator.replicas=1
        --set ipam.mode=kubernetes
        --set kubeProxyReplacement=true
        --set k8sServiceHost=localhost
        --set k8sServicePort=6443
        --set gatewayAPI.enabled=true
        --set l2announcements.enabled=true
        --set externalIPs.enabled=true
        --set hubble.enabled=true
        --set hubble.relay.enabled=true
        --set hubble.ui.enabled=true
        --set hubble.metrics.enabled="{dns,drop,tcp,flow,icmp,http}"
        --set hubble.metrics.serviceMonitor.enabled=false
      changed_when: true

- name: Wait for nodes to be Ready (Cilium CNI active)
  ansible.builtin.command: >
    kubectl wait --for=condition=Ready nodes --all --timeout=120s
  changed_when: false
  retries: 6
  delay: 15
  register: nodes_ready
  until: nodes_ready.rc == 0

# --- Flux ---

- name: Install Flux controllers (with image automation)
  ansible.builtin.command: >
    flux install
    --components-extra=image-reflector-controller,image-automation-controller
  register: flux_install
  changed_when: "'configured' in flux_install.stdout or 'created' in flux_install.stdout or flux_install.changed"

- name: Wait for Flux controllers to be ready
  ansible.builtin.command: flux check
  changed_when: false
  retries: 6
  delay: 10
  register: flux_check
  until: flux_check.rc == 0

# --- Infrastructure: sources + namespaces ---

- name: Apply HelmRepository sources
  ansible.builtin.command: kubectl apply -k {{ flux_base_path }}/infrastructure/sources
  register: sources_apply
  changed_when: "'configured' in sources_apply.stdout or 'created' in sources_apply.stdout"

- name: Apply namespaces
  ansible.builtin.command: kubectl apply -k {{ flux_base_path }}/infrastructure/namespaces
  register: ns_apply
  changed_when: "'configured' in ns_apply.stdout or 'created' in ns_apply.stdout"

# --- cert-manager ---

- name: Apply cert-manager HelmRelease
  ansible.builtin.command: "kubectl apply -k {{ flux_base_path }}/infrastructure/cert-manager"
  register: cm_apply
  changed_when: "'configured' in cm_apply.stdout or 'created' in cm_apply.stdout"

- name: Wait for cert-manager to be ready
  ansible.builtin.command: flux get helmrelease cert-manager -n cert-manager
  changed_when: false
  retries: 15
  delay: 20
  register: cm_ready
  until: "'True' in cm_ready.stdout"

- name: Get mkcert CA root path
  ansible.builtin.command: mkcert -CAROOT
  register: mkcert_caroot
  changed_when: false

- name: Apply ClusterIssuer for mkcert CA
  ansible.builtin.command: kubectl apply -f {{ flux_base_path }}/infrastructure/cert-manager/clusterissuer.yaml
  register: ci_apply
  changed_when: "'configured' in ci_apply.stdout or 'created' in ci_apply.stdout"

- name: Create mkcert CA secret in cert-manager namespace
  ansible.builtin.shell: |
    kubectl create secret tls mkcert-ca \
      --cert="{{ mkcert_caroot.stdout }}/rootCA.pem" \
      --key="{{ mkcert_caroot.stdout }}/rootCA-key.pem" \
      -n cert-manager --dry-run=client -o yaml | kubectl apply -f -
  register: ca_secret
  changed_when: "'configured' in ca_secret.stdout or 'created' in ca_secret.stdout"

- name: Copy mkcert CA to Lima VM trust store
  ansible.builtin.shell: |
    limactl shell {{ lima_vm_name }} sudo bash -c '
      mkdir -p /usr/local/share/ca-certificates
      cat > /usr/local/share/ca-certificates/mkcert-ca.crt << EOFCERT
    {{ lookup("file", mkcert_caroot.stdout + "/rootCA.pem") }}
    EOFCERT
      update-ca-certificates
    '
  changed_when: false
  when: ansible_facts['os_family'] == "Darwin"

- name: Copy mkcert CA to Linux trust store
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: Copy CA certificate
      ansible.builtin.copy:
        src: "{{ mkcert_caroot.stdout }}/rootCA.pem"
        dest: /usr/local/share/ca-certificates/mkcert-ca.crt
        mode: "0644"
      become: true

    - name: Update CA certificates
      ansible.builtin.command: update-ca-certificates
      become: true
      changed_when: false

# --- Sealed Secrets ---

- name: Apply sealed-secrets
  ansible.builtin.command: "kubectl apply -k {{ flux_base_path }}/infrastructure/sealed-secrets"
  register: ss_apply
  changed_when: "'configured' in ss_apply.stdout or 'created' in ss_apply.stdout"

- name: Wait for sealed-secrets controller to be ready
  ansible.builtin.command: flux get helmrelease sealed-secrets -n kube-system
  changed_when: false
  retries: 10
  delay: 15
  register: ss_ready
  until: "'True' in ss_ready.stdout"

# --- Seal secrets ---

- name: Check if Forgejo admin secret exists
  ansible.builtin.command: kubectl get secret forgejo-admin -n forgejo
  register: forgejo_admin_secret
  changed_when: false
  failed_when: false

- name: Generate and seal Forgejo admin secret
  when: forgejo_admin_secret.rc != 0
  ansible.builtin.shell: |
    PASSWORD=$(openssl rand -base64 16)
    kubectl create secret generic forgejo-admin \
      --from-literal=username=forgejo_admin \
      --from-literal=password="$PASSWORD" \
      -n forgejo --dry-run=client -o yaml | \
    kubeseal --controller-name=sealed-secrets --controller-namespace=kube-system --format yaml | kubectl apply -f -
  changed_when: true

- name: Check if Grafana admin secret exists
  ansible.builtin.command: kubectl get secret grafana-admin -n monitoring
  register: grafana_admin_secret
  changed_when: false
  failed_when: false

- name: Generate and seal Grafana admin secret
  when: grafana_admin_secret.rc != 0
  ansible.builtin.shell: |
    PASSWORD=$(openssl rand -base64 16)
    kubectl create secret generic grafana-admin \
      --from-literal=username=admin \
      --from-literal=password="$PASSWORD" \
      -n monitoring --dry-run=client -o yaml | \
    kubeseal --controller-name=sealed-secrets --controller-namespace=kube-system --format yaml | kubectl apply -f -
  changed_when: true

# --- Deploy remaining infrastructure ---

- name: Apply infrastructure components (first pass)
  ansible.builtin.command: "kubectl apply -k {{ flux_base_path }}/infrastructure/{{ item }}"
  loop:
    - garage
    - monitoring
    - strimzi
    - registry
    - forgejo
    - kyverno
  register: infra_apply
  changed_when: "'configured' in infra_apply.stdout or 'created' in infra_apply.stdout"
  failed_when: false

- name: Wait for infrastructure HelmReleases to be ready
  ansible.builtin.shell: |
    flux get helmreleases -A --no-header 2>/dev/null | grep -cv "True" || echo "0"
  register: hr_not_ready
  changed_when: false
  retries: 30
  delay: 20
  until: hr_not_ready.stdout | trim | int == 0
  failed_when: false

- name: Apply infrastructure components (second pass - CRDs now available)
  ansible.builtin.command: "kubectl apply -k {{ flux_base_path }}/infrastructure/{{ item }}"
  loop:
    - cilium
    - monitoring
  register: infra_apply2
  changed_when: "'configured' in infra_apply2.stdout or 'created' in infra_apply2.stdout"

# --- Phase 1: Bootstrap gitops from public GitHub repo (HTTPS, no auth) ---

- name: Apply GitRepository source (public HTTPS, no auth needed)
  ansible.builtin.shell: |
    cat <<'EOF' | kubectl apply -f -
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: GitRepository
    metadata:
      name: wallet-local-gitops
      namespace: flux-system
    spec:
      interval: {{ gitops.interval }}
      url: {{ gitops.forgejo_mirror }}
      ref:
        branch: {{ gitops.branch }}
    EOF
  register: gitrepo_apply
  changed_when: "'configured' in gitrepo_apply.stdout or 'created' in gitrepo_apply.stdout"

- name: Template and apply gitops Kustomization CRs
  ansible.builtin.shell: |
    cat <<'EOF' | kubectl apply -f -
    {{ lookup('template', 'gitops-kustomizations.yaml.j2') }}
    EOF
  register: gitops_apply
  changed_when: "'configured' in gitops_apply.stdout or 'created' in gitops_apply.stdout"

- name: Wait for gitops source to be ready
  ansible.builtin.command: flux get source git wallet-local-gitops
  changed_when: false
  retries: 10
  delay: 10
  register: gitops_source
  until: "'True' in gitops_source.stdout"

# --- Phase 2: Migrate gitops repo to in-cluster Forgejo ---

- name: Get Forgejo admin auth header
  ansible.builtin.shell: >
    echo -n "forgejo_admin:$(kubectl get secret forgejo-admin -n forgejo -o jsonpath='{.data.password}' | base64 -d)" | base64
  register: forgejo_auth
  changed_when: false

- name: Check if gitops user exists in Forgejo
  ansible.builtin.shell: >
    kubectl exec -n forgejo deploy/forgejo -c forgejo --
    wget -qO- --header="Authorization: Basic {{ forgejo_auth.stdout }}"
    http://localhost:3000/api/v1/users/gitops 2>/dev/null; echo $?
  register: gitops_user_check
  changed_when: false
  failed_when: false

- name: Create gitops user in Forgejo via CLI
  when: "'404' in gitops_user_check.stdout or '404' in gitops_user_check.stderr or gitops_user_check.rc != 0"
  ansible.builtin.shell: |
    GITOPS_PW=$(openssl rand -hex 16)
    kubectl exec -n forgejo deploy/forgejo -c forgejo -- \
      forgejo admin user create \
      --username gitops \
      --password "$GITOPS_PW" \
      --email gitops@dev.local \
      --must-change-password=false
  changed_when: true

- name: Check if gitops repo exists in Forgejo
  ansible.builtin.shell: >
    kubectl exec -n forgejo deploy/forgejo -c forgejo --
    wget -qO- http://localhost:3000/api/v1/repos/gitops/wallet-local-gitops 2>&1
  register: gitops_repo_check
  changed_when: false
  failed_when: false

- name: Mirror GitHub repo to Forgejo
  when: "('404' in gitops_repo_check.stdout or '404' in gitops_repo_check.stderr) and gitops.forgejo_mirror is defined"
  ansible.builtin.shell: |
    ADMIN_PW=$(kubectl get secret forgejo-admin -n forgejo -o jsonpath='{.data.password}' | base64 -d)
    AUTH=$(printf '%s' "forgejo_admin:$ADMIN_PW" | base64 -w0 2>/dev/null || printf '%s' "forgejo_admin:$ADMIN_PW" | base64)
    kubectl exec -n forgejo deploy/forgejo -c forgejo -- \
      wget -qO- --post-data='{"clone_addr":"{{ gitops.forgejo_mirror }}","repo_name":"wallet-local-gitops","repo_owner":"gitops","service":"github"}' \
      --header="Content-Type: application/json" \
      --header="Authorization: Basic $AUTH" \
      http://localhost:3000/api/v1/repos/migrate
  changed_when: true

- name: Configure Forgejo SSH deploy key and switch Flux source
  block:
    - name: Check if Forgejo gitops-ssh-key already configured
      ansible.builtin.shell: >
        kubectl get secret gitops-ssh-key -n flux-system
        -o jsonpath='{.data.known_hosts}' | base64 -d | grep -q forgejo
      register: forgejo_key_check
      changed_when: false
      failed_when: false

    - name: Create SSH key and configure for Forgejo
      when: forgejo_key_check.rc != 0
      block:
        - name: Generate SSH key pair
          ansible.builtin.shell: |
            TMPDIR=$(mktemp -d)
            ssh-keygen -t ecdsa -b 384 -f "$TMPDIR/identity" -N "" -q
            echo "$TMPDIR"
          register: ssh_tmpdir
          changed_when: false

        - name: Get Forgejo SSH host key
          ansible.builtin.shell: >
            kubectl exec -n forgejo deploy/forgejo -c forgejo -- cat /data/ssh/gitea.rsa.pub
          register: forgejo_host_key
          changed_when: false

        - name: Replace gitops-ssh-key secret for Forgejo
          ansible.builtin.shell: |
            kubectl delete secret gitops-ssh-key -n flux-system 2>/dev/null || true
            kubectl create secret generic gitops-ssh-key -n flux-system \
              --from-file=identity="{{ ssh_tmpdir.stdout }}/identity" \
              --from-file=identity.pub="{{ ssh_tmpdir.stdout }}/identity.pub" \
              --from-literal=known_hosts="forgejo-ssh.forgejo.svc.cluster.local {{ forgejo_host_key.stdout }}"
          changed_when: true

        - name: Get deploy key public key
          ansible.builtin.shell: cat "{{ ssh_tmpdir.stdout }}/identity.pub"
          register: forgejo_deploy_pub_key
          changed_when: false

        - name: Clean up temp SSH key
          ansible.builtin.file:
            path: "{{ ssh_tmpdir.stdout }}"
            state: absent

    # Always ensure deploy key is in Forgejo (even on rerun)
    - name: Check if deploy key exists in Forgejo
      ansible.builtin.shell: |
        ADMIN_PW=$(kubectl get secret forgejo-admin -n forgejo -o jsonpath='{.data.password}' | base64 -d)
        AUTH=$(printf '%s' "forgejo_admin:$ADMIN_PW" | base64 -w0 2>/dev/null || printf '%s' "forgejo_admin:$ADMIN_PW" | base64)
        RESULT=$(kubectl exec -n forgejo deploy/forgejo -c forgejo -- \
          wget -qO- --header="Authorization: Basic $AUTH" \
          http://localhost:3000/api/v1/repos/gitops/wallet-local-gitops/keys 2>/dev/null)
        echo "$RESULT"
      register: forgejo_keys_check
      changed_when: false
      failed_when: false

    - name: Add deploy key to Forgejo repo
      when: "forgejo_keys_check.stdout == '[]' or forgejo_keys_check.stdout == ''"
      ansible.builtin.shell: |
        ADMIN_PW=$(kubectl get secret forgejo-admin -n forgejo -o jsonpath='{.data.password}' | base64 -d)
        AUTH=$(printf '%s' "forgejo_admin:$ADMIN_PW" | base64 -w0 2>/dev/null || printf '%s' "forgejo_admin:$ADMIN_PW" | base64)
        PUB_KEY=$(kubectl get secret gitops-ssh-key -n flux-system -o jsonpath='{.data.identity\.pub}' | base64 -d)
        kubectl exec -n forgejo deploy/forgejo -c forgejo -- \
          wget -qO- --post-data="{\"title\":\"flux-gitops\",\"key\":\"$PUB_KEY\",\"read_only\":false}" \
          --header="Content-Type: application/json" \
          --header="Authorization: Basic $AUTH" \
          http://localhost:3000/api/v1/repos/gitops/wallet-local-gitops/keys
      changed_when: true

    - name: Update GitRepository to point at Forgejo
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: GitRepository
        metadata:
          name: wallet-local-gitops
          namespace: flux-system
        spec:
          interval: 1m
          url: ssh://git@forgejo-ssh.forgejo.svc.cluster.local/gitops/wallet-local-gitops.git
          ref:
            branch: main
          secretRef:
            name: gitops-ssh-key
        EOF
      register: forgejo_gitrepo
      changed_when: "'configured' in forgejo_gitrepo.stdout or 'created' in forgejo_gitrepo.stdout"

    - name: Restart source-controller to pick up new secret
      ansible.builtin.command: kubectl rollout restart deployment source-controller -n flux-system
      changed_when: false

    - name: Wait for Forgejo gitops source to be ready
      ansible.builtin.command: flux get source git wallet-local-gitops
      changed_when: false
      retries: 10
      delay: 10
      register: forgejo_gitops_source
      until: "'True' in forgejo_gitops_source.stdout"

# --- Build infrastructure + cosign ---

- name: Apply build infrastructure
  ansible.builtin.command: "kubectl apply -k {{ flux_base_path }}/infrastructure/builds"
  register: builds_apply
  changed_when: "'configured' in builds_apply.stdout or 'created' in builds_apply.stdout"
  failed_when: false

- name: Generate cosign key pair if not exists
  ansible.builtin.shell: |
    if ! kubectl get secret cosign-key -n flux-system >/dev/null 2>&1; then
      COSIGN_PASSWORD="" cosign generate-key-pair k8s://flux-system/cosign-key
      echo "created"
    else
      echo "exists"
    fi
  register: cosign_key
  changed_when: "'created' in cosign_key.stdout"

# --- Status ---

- name: Show status
  ansible.builtin.shell: |
    echo "=== Git Sources ==="
    flux get sources git
    echo ""
    echo "=== Kustomizations ==="
    flux get kustomizations
    echo ""
    echo "=== HelmReleases ==="
    flux get helmreleases -A
  register: final_status
  changed_when: false

- name: Display status
  ansible.builtin.debug:
    var: final_status.stdout_lines
