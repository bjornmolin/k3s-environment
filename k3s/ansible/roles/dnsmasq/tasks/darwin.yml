---
- name: Install dnsmasq via Homebrew
  community.general.homebrew:
    name: dnsmasq
    state: present

- name: Determine Homebrew prefix
  ansible.builtin.command: brew --prefix
  register: brew_prefix
  changed_when: false

- name: Ensure dnsmasq.d directory exists
  ansible.builtin.file:
    path: "{{ brew_prefix.stdout }}/etc/dnsmasq.d"
    state: directory
    mode: "0755"

- name: Configure dnsmasq for dev.local
  ansible.builtin.template:
    src: dnsmasq-dev-local.conf.j2
    dest: "{{ brew_prefix.stdout }}/etc/dnsmasq.d/dev-local.conf"
    mode: "0644"
  notify: restart dnsmasq macos

- name: Ensure dnsmasq main config includes dnsmasq.d directory
  ansible.builtin.lineinfile:
    path: "{{ brew_prefix.stdout }}/etc/dnsmasq.conf"
    line: "conf-dir={{ brew_prefix.stdout }}/etc/dnsmasq.d/,*.conf"
    create: true
    mode: "0644"
  notify: restart dnsmasq macos

- name: Create /etc/resolver directory
  ansible.builtin.file:
    path: /etc/resolver
    state: directory
    mode: "0755"
  become: true

- name: Configure macOS resolver for dev.local
  ansible.builtin.template:
    src: resolver-dev-local.j2
    dest: /etc/resolver/{{ dev_domain }}
    mode: "0644"
  become: true

- name: Copy dnsmasq plist to system LaunchDaemons
  ansible.builtin.copy:
    src: "{{ brew_prefix.stdout }}/opt/dnsmasq/homebrew.mxcl.dnsmasq.plist"
    dest: /Library/LaunchDaemons/homebrew.mxcl.dnsmasq.plist
    remote_src: true
    mode: "0644"
  become: true

- name: Load dnsmasq LaunchDaemon
  ansible.builtin.command: launchctl load -w /Library/LaunchDaemons/homebrew.mxcl.dnsmasq.plist
  become: true
  changed_when: false
  failed_when: false

- name: Flush macOS DNS cache
  ansible.builtin.command: dscacheutil -flushcache
  become: true
  changed_when: false
