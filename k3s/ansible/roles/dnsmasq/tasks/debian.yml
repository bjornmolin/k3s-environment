---
- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: present
    update_cache: true
  become: true

- name: Configure dnsmasq for dev.local
  ansible.builtin.template:
    src: dnsmasq-dev-local.conf.j2
    dest: /etc/dnsmasq.d/dev-local.conf
    mode: "0644"
  become: true
  notify: restart dnsmasq linux

- name: Check if systemd-resolved is active
  ansible.builtin.command: systemctl is-active systemd-resolved
  register: resolved_active
  changed_when: false
  failed_when: false

- name: Configure dnsmasq to listen on alternate port (when systemd-resolved uses 53)
  ansible.builtin.lineinfile:
    path: /etc/dnsmasq.d/dev-local.conf
    line: "port=5353"
    insertafter: EOF
  become: true
  when: resolved_active.rc == 0
  notify: restart dnsmasq linux

- name: Configure dnsmasq to bind only to localhost
  ansible.builtin.lineinfile:
    path: /etc/dnsmasq.d/dev-local.conf
    line: "listen-address=127.0.0.1"
    insertafter: EOF
  become: true
  when: resolved_active.rc == 0
  notify: restart dnsmasq linux

- name: Create systemd-resolved drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"
  become: true
  when: resolved_active.rc == 0

- name: Forward dev.local to dnsmasq via systemd-resolved
  ansible.builtin.copy:
    content: |
      [Resolve]
      DNS=127.0.0.1:5353
      Domains=~{{ dev_domain }}
    dest: /etc/systemd/resolved.conf.d/dev-local.conf
    mode: "0644"
  become: true
  when: resolved_active.rc == 0
  notify: restart systemd-resolved

- name: Enable and start dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started
  become: true
