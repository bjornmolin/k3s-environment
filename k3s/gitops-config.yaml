# Git repository for application deployments.
# Phase 1: Flux bootstraps from this URL (GitHub)
# Phase 2: Repo is mirrored to in-cluster Forgejo, Flux switches to Forgejo
gitops:
  url: ssh://git@github.com/bjornmolin/wallet-local-gitops.git
  branch: main
  interval: 1m
  # Public URL to mirror into Forgejo on first boot
  forgejo_mirror: https://github.com/bjornmolin/wallet-local-gitops.git

# Container image builds (Forgejo Actions + Buildah + Cosign)
builds: []
